version: "3.9"

services:
  # ──────────────────────────────────────────────
  # OSS Core: PostHog (Product Analytics)
  # ──────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: posthog
      POSTGRES_USER: posthog
      POSTGRES_PASSWORD: ${POSTHOG_DB_PASSWORD:-posthog_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U posthog -d posthog"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  posthog:
    image: posthog/posthog:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://posthog:${POSTHOG_DB_PASSWORD:-posthog_secret}@postgres:5432/posthog
      REDIS_URL: redis://redis:6379
      SECRET_KEY: ${POSTHOG_SECRET_KEY:-super-secret-key-change-in-production}
      POSTHOG_HOST: ${POSTHOG_HOST:-http://localhost:8000}
      POSTHOG_SITE_URL: ${POSTHOG_SITE_URL:-http://localhost:8000}
      IS_DISABLED: "false"
    ports:
      - "8000:8000"
    volumes:
      - posthog_data:/var/lib/posthog

  # ──────────────────────────────────────────────
  # OSS Core: Matomo (Web Analytics)
  # ──────────────────────────────────────────────
  matomo-db:
    image: mariadb:10.11
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MATOMO_DB_ROOT_PASSWORD:-matomo_root_secret}
      MYSQL_DATABASE: matomo
      MYSQL_USER: matomo
      MYSQL_PASSWORD: ${MATOMO_DB_PASSWORD:-matomo_secret}
    volumes:
      - matomo_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  matomo:
    image: matomo:5-apache
    restart: unless-stopped
    depends_on:
      matomo-db:
        condition: service_healthy
    environment:
      MATOMO_DATABASE_HOST: matomo-db
      MATOMO_DATABASE_ADAPTER: mysqli
      MATOMO_DATABASE_TABLES_PREFIX: matomo_
      MATOMO_DATABASE_USERNAME: matomo
      MATOMO_DATABASE_PASSWORD: ${MATOMO_DB_PASSWORD:-matomo_secret}
      MATOMO_DATABASE_DBNAME: matomo
      MATOMO_DATABASE_PORT: "3306"
    ports:
      - "8080:80"
    volumes:
      - matomo_data:/var/www/html

  # ──────────────────────────────────────────────
  # Agent Service (LangGraph-based agentic layer)
  # ──────────────────────────────────────────────
  agent:
    build:
      context: .
      dockerfile: Dockerfile.agent
    restart: unless-stopped
    depends_on:
      - posthog
      - matomo
    environment:
      # OpenAI-compatible LLM endpoint
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-sk-placeholder}
      MODEL: ${MODEL:-gpt-4o}

      # PostHog connection
      POSTHOG_HOST: ${POSTHOG_HOST:-http://posthog:8000}
      POSTHOG_API_KEY: ${POSTHOG_API_KEY:-}

      # Matomo connection
      MATOMO_URL: ${MATOMO_URL:-http://matomo:80}
      MATOMO_TOKEN_AUTH: ${MATOMO_TOKEN_AUTH:-}

      # Agent configuration
      AGENT_LOG_LEVEL: ${AGENT_LOG_LEVEL:-info}
      AGENT_MAX_TOKENS: ${AGENT_MAX_TOKENS:-4096}
      AGENT_TEMPERATURE: ${AGENT_TEMPERATURE:-0.1}
    ports:
      - "8081:8081"
    volumes:
      - ./agents:/app/agents:ro

volumes:
  postgres_data:
  posthog_data:
  matomo_db_data:
  matomo_data: